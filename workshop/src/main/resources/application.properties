server.port=${SERVER_PORT:8081}

# ==============================================================
# Optional secrets file (KHÔNG commit). Nếu tồn tại sẽ được load đè lên
# các giá trị mặc định trong file này. Đặt secret thật ở đây cho dev local.
# ==============================================================
spring.config.import=optional:file:./application-local.properties,optional:file:../application-local.properties,optional:file:./.env[.properties],optional:file:../.env[.properties]

# ==============================================================
# Database (Neon Postgres)
# Đẩy hết secrets ra biến môi trường, KHÔNG hardcode trong source.
# ==============================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/unihub}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Tomcat capacity for k6 high-concurrency registration tests
server.tomcat.threads.max=${TOMCAT_THREADS_MAX:800}
server.tomcat.threads.min-spare=${TOMCAT_THREADS_MIN_SPARE:100}
server.tomcat.accept-count=${TOMCAT_ACCEPT_COUNT:2000}
server.tomcat.max-connections=${TOMCAT_MAX_CONNECTIONS:20000}
server.tomcat.connection-timeout=${TOMCAT_CONNECTION_TIMEOUT:5s}

# JWT (signing key, KHÔNG được commit khoá thật trong production)
# Default chỉ dùng cho dev local, deploy thật BẮT BUỘC set JWT_SECRET
application.security.jwt.secret-key=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
application.security.jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# Google Login
google.client.id=${GOOGLE_CLIENT_ID:}

# GitHub Login
github.client.id=${GITHUB_CLIENT_ID:}
github.client.secret=${GITHUB_CLIENT_SECRET:}

# Email (Gmail SMTP) — dùng App Password, không bao giờ commit
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.email.from=${MAIL_FROM:noreply@unihub.local}
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# Payment QR (SePay)
app.payment.sepay.enabled=${SEPAY_ENABLED:true}
app.payment.sepay.validate-url=${SEPAY_VALIDATE_URL:false}
app.payment.sepay.account=${SEPAY_ACCOUNT:0000000000}
app.payment.sepay.bank=${SEPAY_BANK:MBBank}

# ==============================================================
# Redis (Distributed rate limit + fairness queue)
# Khi Redis không khả dụng, hệ thống sẽ tự fallback sang RAM.
# ==============================================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=${REDIS_TIMEOUT:300ms}
spring.data.redis.connect-timeout=${REDIS_CONNECT_TIMEOUT:300ms}
spring.data.redis.lettuce.shutdown-timeout=${REDIS_LETTUCE_SHUTDOWN_TIMEOUT:100ms}

# Bật rate limit theo MẶC ĐỊNH để chống spike
app.rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
# Mỗi IP tối đa N request / cửa sổ T (giây) — dùng cho /api/tickets/register
app.rate-limit.max-requests=${RATE_LIMIT_MAX_REQUESTS:5}
app.rate-limit.window-seconds=${RATE_LIMIT_WINDOW_SECONDS:10}
# Mỗi USER tối đa N register / cửa sổ T (giây) — fairness giữa các sinh viên
app.rate-limit.user.max-requests=${RATE_LIMIT_USER_MAX_REQUESTS:3}
app.rate-limit.user.window-seconds=${RATE_LIMIT_USER_WINDOW_SECONDS:10}
# Backend store: redis | memory (mặc định auto: dùng Redis nếu kết nối được, không thì memory)
app.rate-limit.store=${RATE_LIMIT_STORE:auto}

# Seat counter repair job
app.seat-sync.initial-delay-ms=${SEAT_SYNC_INITIAL_DELAY_MS:600000}
app.seat-sync.fixed-delay-ms=${SEAT_SYNC_FIXED_DELAY_MS:600000}
app.pending-ticket.timeout-minutes=${PENDING_TICKET_TIMEOUT_MINUTES:15}

# JWT auth cache for high-concurrency registration windows
app.jwt-auth-cache.enabled=${JWT_AUTH_CACHE_ENABLED:true}
app.jwt-auth-cache.ttl-ms=${JWT_AUTH_CACHE_TTL_MS:300000}
app.jwt-auth-cache.max-size=${JWT_AUTH_CACHE_MAX_SIZE:30000}

# Registration duplicate cache for repeated k6 VU loops
app.registration-cache.enabled=${REGISTRATION_CACHE_ENABLED:true}
app.registration-cache.ttl-ms=${REGISTRATION_CACHE_TTL_MS:900000}
app.registration-cache.max-size=${REGISTRATION_CACHE_MAX_SIZE:50000}

# Optional notification channels
app.notifications.telegram.enabled=${TELEGRAM_NOTIFICATIONS_ENABLED:false}
app.notifications.telegram.bot-token=${TELEGRAM_BOT_TOKEN:}
app.notifications.telegram.api-base-url=${TELEGRAM_API_BASE_URL:https://api.telegram.org}

# ==============================================================
# AI Summary (Gemini) — chỉ chạy backend, không expose key cho client
# ==============================================================
app.ai.gemini.enabled=${GEMINI_ENABLED:true}
app.ai.gemini.api-key=${GEMINI_API_KEY:}
app.ai.gemini.model=${GEMINI_MODEL:gemini-1.5-flash-latest}
app.ai.gemini.api-base-url=${GEMINI_API_BASE_URL:https://generativelanguage.googleapis.com}
app.ai.gemini.timeout-seconds=${GEMINI_TIMEOUT_SECONDS:30}

# HikariCP Connection Pool (For Stress Testing)
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.connection-timeout=30000

# Resilience4j Circuit Breaker
resilience4j.circuitbreaker.instances.sepay.sliding-window-size=10
resilience4j.circuitbreaker.instances.sepay.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.sepay.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.sepay.permitted-number-of-calls-in-half-open-state=3
